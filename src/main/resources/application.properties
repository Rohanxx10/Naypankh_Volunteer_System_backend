spring.application.name=volunteer-system

# H2 Database ? file-based so data survives restarts
spring.datasource.url=jdbc:h2:file:./data/volunteerdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA ? create-drop wipes & rebuilds schema on every boot;
# DataSeeder always re-seeds so the dashboard has correct data immediately.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080

# JWT
app.jwt.secret=verySecretKeyForVolunteerSystemThatIsAtLeast256BitsLong1234567890
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173